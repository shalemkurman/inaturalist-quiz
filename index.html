<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון זיהוי</title>
    <!-- קישור לקובץ העיצוב -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- מסך 1: הגדרת החיפוש והתחלה -->
        <div id="setup-screen" class="card">
            <h1>חידון זיהוי</h1>
            <p class="subtitle">הקלד בשורת החיפוש כדי לבחור קבוצה או זן להתחלת החידון</p>

            <form id="setup-form">
                <div class="form-group">
                    <label for="species-search">חפש קבוצה / זן:</label>
                    <input type="text" id="species-search" placeholder="התחל להקליד..." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-dropdown hidden"></div>
                </div>

                <button type="submit" class="primary-btn">התחל חידון</button>
            </form>
        </div>

        <!-- מסך 2: מסך השאלון (מוסתר בהתחלה) -->
        <div id="quiz-screen" class="card hidden">
            <div class="quiz-header">
                <div class="quiz-stats">
                    <span id="question-counter">שאלה 1 מתוך 10</span>
                    <span id="score-counter">ניקוד: 0</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="image-container">
                <img id="quiz-image" src="" alt="תמונת זיהוי">
                <div id="photo-credits" class="photo-credits">צילום: -</div>
            </div>

            <div id="options-container" class="options-grid">
                <!-- כפתורי התשובות יטענו לכאן דינמית מ-JS -->
            </div>

            <button id="next-btn" class="primary-btn hidden">שאלה הבאה</button>
        </div>

        <!-- מסך 3: מסך תוצאות סיכום (מוסתר בהתחלה) -->
        <div id="results-screen" class="card hidden">
            <h2>החידון הסתיים!</h2>
            <div id="final-score" class="score-display">הציון שלך: 0 מתוך 10</div>
            <p id="final-feedback" class="feedback-text">כל הכבוד!</p>
            <button id="restart-btn" class="primary-btn">נסה שוב</button>
        </div>
    </div>

    <!-- קישור לקובץ הקוד - חייב להיות בתחתית העמוד -->
    <script src="script.js"></script>
</body>
</html>
